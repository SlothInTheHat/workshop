version: '3'
services:
  postgres:
    image: 'postgres:16'
    container_name: 'workshop-postgres'
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-optura}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'pg_isready',
          '-U',
          '${POSTGRES_USER:-postgres}',
          '-d',
          '${POSTGRES_DB:-optura}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  workshop:
    build:
      context: .
      args:
        COMMIT_SHA: ${COMMIT_SHA:-local}
        BUILD_DATE: ${BUILD_DATE:-}
        APP_VERSION: ${APP_VERSION:-0.0.1}
        NPM_TOKEN: ${NPM_TOKEN}
    image: workshop:local
    ports:
      - '3001:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres:
